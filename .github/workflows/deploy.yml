name: Deploy Fleet Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ secrets.TARGET_DIR }}/public-hub
            git pull origin main

            # Gracefully stop and remove the old PM2 process so it releases file locks on .next
            pm2 stop fleet-hub-prod || true
            pm2 delete fleet-hub-prod || true

            # Poll until PM2 confirms the process is fully gone (max 30s)
            for i in {1..30}; do
              if ! pm2 describe fleet-hub-prod > /dev/null 2>&1; then
                break
              fi
              sleep 1
            done

            # Safety net: kill any lingering node processes that might still hold .next open
            pkill -f "node.*fleet-hub-prod" || true
            sleep 2

            # Now that the process is fully dead, safely remove the old build
            rm -rf .next
            npm install
            npm run build
            pm2 start npm --name fleet-hub-prod -- start
